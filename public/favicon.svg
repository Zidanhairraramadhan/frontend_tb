<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded box -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#121212" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  
  <!-- Left Link Loop (Music Notehead 1) -->
  <rect x="18" y="34" width="12" height="18" rx="6" fill="none" stroke="url(#noteGrad)" stroke-width="4.5" transform="rotate(-15 24 43)"/>
  
  <!-- Right Link Loop (Music Notehead 2 / Interlocking Link) -->
  <rect x="34" y="30" width="12" height="18" rx="6" fill="none" stroke="url(#linkGrad)" stroke-width="4.5" transform="rotate(-15 40 39)"/>
  
  <!-- Note Stem 1 -->
  <path d="M28 36V17" stroke="url(#noteGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Note Stem 2 -->
  <path d="M44 32V13" stroke="url(#linkGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Connecting Flag (Link Beam) -->
  <path d="M28 17C34 15 38 15 44 13" stroke="url(#linkGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M28 23C34 21 38 21 44 19" stroke="url(#noteGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
